<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Portfolio // BOOM!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #ffde00;
            --blue: #2fe1ff;
            --red: #ff3e3e;
            --black: #000;
            --border-width: 4px;
        }

        body {
            background-color: #f0f0f0;
            background-image: radial-gradient(var(--black) 1px, transparent 0);
            background-size: 20px 20px; /* Halftone dot effect */
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 5rem;
            color: var(--yellow);
            text-shadow: 4px 4px 0 var(--black), -2px -2px 0 var(--blue), 6px 6px 0 var(--red);
            letter-spacing: 5px;
            transform: skew(-5deg) rotate(-2deg);
            margin: 0;
        }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: white;
            border: var(--border-width) solid var(--black);
            box-shadow: 10px 10px 0 var(--black);
            padding: 10px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            opacity: 0; /* Hidden initially for JS animation */
            transform: translateY(50px);
        }

        .panel:nth-child(even) { transform: rotate(1deg) translateY(50px); }
        .panel:nth-child(odd) { transform: rotate(-1deg) translateY(50px); }

        .panel.visible {
            opacity: 1;
            transform: translateY(0) rotate(var(--rot, 0deg));
        }

        .panel:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 10;
            box-shadow: 15px 15px 0 var(--blue);
        }

        .panel img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border: 2px solid var(--black);
            display: block;
        }

        .caption {
            font-family: 'Bangers', cursive;
            background: var(--yellow);
            border-top: var(--border-width) solid var(--black);
            padding: 5px 10px;
            margin-top: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .loading-text {
            font-family: 'Bangers';
            font-size: 2rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>GALLERY REVEAL!</h1>
    </header>

    <div id="gallery">
        <p class="loading-text">Scouting the multiverse for photos...</p>
    </div>

    <script>
        // CONFIGURATION: Replace these with your GitHub details
        const USERNAME = 'dizzar-mw'; 
        const REPO = 'FiliruPaints'; 
        const FOLDER_PATH = 'photos';

        async function fetchPhotos() {
            const gallery = document.getElementById('gallery');
            const apiUrl = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}`;

            try {
                const response = await fetch(apiUrl);
                const files = await response.json();

                // Clear loading text
                gallery.innerHTML = '';

                // Filter for images only
                const images = files.filter(file => 
                    file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)
                );

                images.forEach((file, index) => {
                    const panel = document.createElement('div');
                    panel.className = 'panel';
                    
                    // Assign random rotation for the comic look
                    const rot = (Math.random() * 4 - 2).toFixed(2);
                    panel.style.setProperty('--rot', `${rot}deg`);

                    panel.innerHTML = `
                        <img src="${file.download_url}" alt="${file.name}">
                        <div class="caption">Shot #${index + 1}: ${file.name.split('.')[0]}</div>
                    `;

                    gallery.appendChild(panel);

                    // Animate in with a slight stagger
                    setTimeout(() => {
                        panel.classList.add('visible');
                    }, index * 100);
                });

            } catch (error) {
                console.error("Error fetching images:", error);
                gallery.innerHTML = `<p class="loading-text">KAPOW! Error loading images. Check folder name.</p>`;
            }
        }

        // Initialize
        fetchPhotos();
    </script>
</body>
</html>
